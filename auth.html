<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Slumber — Sign in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0F1A;--bg2:#131929;--bg3:#1A2235;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#F0F4FF;--muted:rgba(255,255,255,0.4);--muted2:rgba(255,255,255,0.2);
  --green:#00E5A0;--green2:#00B87A;--purple:#A78BFA;--purple2:#7C5CFC;
  --coral:#FF6B6B;--coral-dim:rgba(255,107,107,0.1);
  --green-dim:rgba(0,229,160,0.1);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:0.15}
.orb1{width:300px;height:300px;background:var(--purple2);top:-80px;right:-60px}
.orb2{width:250px;height:250px;background:var(--green2);bottom:80px;left:-80px}
.wrap{width:100%;max-width:400px;position:relative;z-index:1}

/* LOGO */
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--green),var(--purple2));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px}
.logo-name{font-size:24px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#F0F4FF,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:13px;color:var(--muted);font-weight:500;margin-top:4px}

/* TABS */
.tabs{display:flex;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:16px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border-radius:12px;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,rgba(0,229,160,0.15),rgba(124,92,252,0.15));color:var(--text);border:0.5px solid var(--border2)}

/* FORM */
.form{display:none;flex-direction:column;gap:14px;animation:fadeUp 0.3s ease}
.form.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.inp-wrap{position:relative}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;font-weight:500;transition:border-color 0.2s,background 0.2s}
.inp::placeholder{color:var(--muted2)}
.inp:focus{border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.04)}
.inp.error{border-color:rgba(255,107,107,0.5);background:var(--coral-dim)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px}

/* ALERTS */
.alert{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;line-height:1.5;display:none}
.alert.show{display:block}
.alert.err{background:var(--coral-dim);border:1px solid rgba(255,107,107,0.2);color:#FF9999}
.alert.ok{background:var(--green-dim);border:1px solid rgba(0,229,160,0.2);color:var(--green)}

/* SUBMIT BTN */
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--green),var(--green2));color:#0B1A12;border:none;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.02em;transition:opacity 0.2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:active{opacity:0.85}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#0B1A12;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* GOOGLE BTN */
.google-btn{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.2s,border-color 0.2s}
.google-btn:hover{background:rgba(255,255,255,0.07);border-color:var(--border2)}
.google-ico{width:20px;height:20px}

/* FOOTER */
.auth-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);font-weight:500}
.auth-footer a{color:var(--green);text-decoration:none;font-weight:700}

/* PASSWORD STRENGTH */
.strength-wrap{margin-top:6px}
.strength-bars{display:flex;gap:4px;margin-bottom:4px}
.strength-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);transition:background 0.3s}
.strength-bar.weak{background:var(--coral)}
.strength-bar.mid{background:var(--amber, #FFBE3D)}
.strength-bar.strong{background:var(--green)}
.strength-lbl{font-size:11px;color:var(--muted);font-weight:500}

/* FORGOT */
.forgot-link{font-size:12px;color:var(--green);font-weight:700;text-decoration:none;text-align:right;display:block;margin-top:-4px}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🌙</div>
    <div class="logo-name">Slumber</div>
    <div class="logo-sub">Your personal sleep tracker</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form active" id="form-login">
    <div class="alert err" id="login-err"></div>
    <div class="alert ok" id="login-ok"></div>

    <div class="field">
      <label>Email</label>
      <input class="inp" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <a class="forgot-link" href="#" onclick="showForgot()">Forgot password?</a>
      <div class="inp-wrap">
        <input class="inp" id="login-pass" type="password" placeholder="Your password" autocomplete="current-password">
        <button class="eye-btn" onclick="toggleEye('login-pass',this)" type="button">👁</button>
      </div>
    </div>

    <button class="submit-btn" id="login-btn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Sign in →</span>
    </button>

    <div class="divider">or</div>

    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-ico" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="form" id="form-signup">
    <div class="alert err" id="signup-err"></div>
    <div class="alert ok" id="signup-ok"></div>

    <div class="field">
      <label>Email</label>
      <input class="inp" id="signup-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="inp-wrap">
        <input class="inp" id="signup-pass" type="password" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
        <button class="eye-btn" onclick="toggleEye('signup-pass',this)" type="button">👁</button>
      </div>
      <div class="strength-wrap" id="strength-wrap" style="display:none">
        <div class="strength-bars">
          <div class="strength-bar" id="sb1"></div>
          <div class="strength-bar" id="sb2"></div>
          <div class="strength-bar" id="sb3"></div>
          <div class="strength-bar" id="sb4"></div>
        </div>
        <div class="strength-lbl" id="strength-lbl">Too short</div>
      </div>
    </div>

    <div class="field">
      <label>Confirm password</label>
      <div class="inp-wrap">
        <input class="inp" id="signup-confirm" type="password" placeholder="Repeat your password" autocomplete="new-password">
        <button class="eye-btn" onclick="toggleEye('signup-confirm',this)" type="button">👁</button>
      </div>
    </div>

    <button class="submit-btn" id="signup-btn" onclick="doSignup()">
      <div class="spinner"></div>
      <span class="btn-text">Create account →</span>
    </button>

    <div class="divider">or</div>

    <button class="google-btn" onclick="doGoogle()">
      <svg class="google-ico" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="auth-footer">
    By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://edewdvjaefbwisvnuoyq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkZXdkdmphZWZid2lzdm51b3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODA3OTgsImV4cCI6MjA5NTI1Njc5OH0.ICW3fXz0Rxc7mPqcl_wvPTcDntqSdmQwZ0D5Mg87FF8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    const profile = localStorage.getItem('slumber_profile');
    if (profile) {
      try {
        const p = JSON.parse(profile);
        if (p.onboarding_complete) {
          window.location.href = 'index.html';
          return;
        }
      } catch(e) {}
    }
    window.location.href = 'onboarding.html';
  }
});

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
  clearAlerts();
}

function clearAlerts() {
  ['login-err','login-ok','signup-err','signup-ok'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('show'); el.textContent = ''; }
  });
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function checkStrength(val) {
  const wrap = document.getElementById('strength-wrap');
  const lbl = document.getElementById('strength-lbl');
  const bars = [1,2,3,4].map(i => document.getElementById('sb'+i));
  if (!val) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  bars.forEach(b => { b.className = 'strength-bar'; });
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const cls = score <= 1 ? 'weak' : score <= 2 ? 'mid' : 'strong';
  const labels = ['','Too weak','Could be stronger','Almost there','Strong password'];
  for (let i = 0; i < score; i++) bars[i].classList.add(cls);
  lbl.textContent = labels[score] || 'Too short';
  lbl.style.color = score <= 1 ? '#FF6B6B' : score <= 2 ? '#FFBE3D' : '#00E5A0';
}

async function doLogin() {
  clearAlerts();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showAlert('login-err', 'Please fill in all fields.'); return; }
  setLoading('login-btn', true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('login-btn', false);
  if (error) { showAlert('login-err', error.message); return; }
}

async function doSignup() {
  clearAlerts();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!email || !pass || !confirm) { showAlert('signup-err', 'Please fill in all fields.'); return; }
  if (pass.length < 8) { showAlert('signup-err', 'Password must be at least 8 characters.'); return; }
  if (pass !== confirm) { showAlert('signup-err', 'Passwords do not match.'); return; }
  setLoading('signup-btn', true);
  const { error } = await sb.auth.signUp({ email, password: pass });
  setLoading('signup-btn', false);
  if (error) { showAlert('signup-err', error.message); return; }
  showAlert('signup-ok', '✅ Account created! Check your email to confirm, then sign in.');
}

async function doGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/onboarding.html' }
  });
  if (error) showAlert('login-err', error.message);
}

async function showForgot() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showAlert('login-err', 'Enter your email above first, then click Forgot password.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) { showAlert('login-err', error.message); return; }
  showAlert('login-ok', '📧 Password reset email sent! Check your inbox.');
}

window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const profile = localStorage.getItem('slumber_profile');
    if (profile) {
      try {
        const p = JSON.parse(profile);
        if (p.onboarding_complete) { window.location.href = 'index.html'; return; }
      } catch(e) {}
    }
    window.location.href = 'onboarding.html';
  }
});
</script>
</body>
</html>
